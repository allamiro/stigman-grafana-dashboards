# STIG Manager + Keycloak + Grafana (Infinity) reporting lab
#
# LOCAL DEVELOPMENT LAB — plain HTTP, Keycloak in start-dev mode.
# See README.md "Production hardening" before using any of this outside a lab.
#
# Host port deviations from the default plan (documented in README):
#   Keycloak  -> localhost:8180 (host port 8080 already in use on this machine)
#   Grafana   -> localhost:3200 (host port 3000 already in use on this machine)
#   STIG Manager -> localhost:54000 (as planned)

name: stigmanager-grafana-lab

networks:
  stigman-lab:
    driver: bridge

volumes:
  keycloak-db-data:
  stigman-db-data:
  grafana-data:
  prometheus-data:

services:
  keycloak-db:
    image: postgres:16.14-alpine
    container_name: sml-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set in .env}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks: [stigman-lab]
    # No published ports: only Keycloak needs to reach this database.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: sml-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]   # start-dev: LAB ONLY (HTTP, no clustering)
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set in .env}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set in .env}
      KC_HEALTH_ENABLED: "true"
      # No KC_HOSTNAME on purpose: the issuer follows the request host, so
      # browsers get http://localhost:8180/realms/stigman and containers get
      # http://keycloak:8080/realms/stigman. See README "Keycloak URLs".
      # Values substituted into keycloak/realm-import/stigman-realm.json:
      NEXUS_REPORTER_CLIENT_SECRET: ${NEXUS_REPORTER_CLIENT_SECRET:?set in .env}
      GRAFANA_OIDC_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET:?set in .env}
      STIGMAN_ADMIN_PASSWORD: ${STIGMAN_ADMIN_PASSWORD:?set in .env}
    volumes:
      - ./keycloak/realm-import:/opt/keycloak/data/import:ro
    networks: [stigman-lab]
    ports:
      - "8180:8080"   # documented deviation: host 8080 is occupied
    healthcheck:
      # ubi-micro image has no curl/wget; use bash /dev/tcp against the
      # management interface (port 9000, KC_HEALTH_ENABLED).
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  stigman-db:
    image: mysql:8.0.46
    container_name: sml-stigman-db
    restart: unless-stopped
    command:
      - mysqld
      - --innodb-buffer-pool-size=512M
      - --sort_buffer_size=32M
    environment:
      MYSQL_DATABASE: ${STIGMAN_DB_NAME:-stigman}
      MYSQL_USER: ${STIGMAN_DB_USER:-stigman}
      MYSQL_PASSWORD: ${STIGMAN_DB_PASSWORD:?set in .env}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - stigman-db-data:/var/lib/mysql
    networks: [stigman-lab]
    # No published ports: only STIG Manager needs to reach this database.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  stigman:
    image: nuwcdivnpt/stig-manager:1.6.13
    container_name: sml-stigman
    restart: unless-stopped
    depends_on:
      stigman-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      STIGMAN_API_PORT: "54000"
      STIGMAN_DB_HOST: stigman-db
      STIGMAN_DB_PORT: "3306"
      STIGMAN_DB_SCHEMA: ${STIGMAN_DB_NAME:-stigman}
      STIGMAN_DB_USER: ${STIGMAN_DB_USER:-stigman}
      STIGMAN_DB_PASSWORD: ${STIGMAN_DB_PASSWORD:?set in .env}
      # Internal (container-to-container) issuer/JWKS source:
      STIGMAN_OIDC_PROVIDER: http://keycloak:8080/realms/stigman
      # Browser-facing issuer used by the web client:
      STIGMAN_CLIENT_OIDC_PROVIDER: http://localhost:8180/realms/stigman
      STIGMAN_CLIENT_ID: stig-manager
      # Enforce audience validation (tokens carry aud=stig-manager via a
      # Keycloak audience mapper; see realm import).
      STIGMAN_JWT_AUD_VALUE: stig-manager
      STIGMAN_CLASSIFICATION: U
    networks: [stigman-lab]
    ports:
      - "54000:54000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:54000/api/op/configuration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  grafana:
    image: grafana/grafana:13.1.0
    container_name: sml-grafana
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
      stigman:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set in .env}
      GF_SERVER_ROOT_URL: http://localhost:3200
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource 3.11.1
      # --- Keycloak SSO (Generic OAuth) ---
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${GRAFANA_OIDC_CLIENT_ID:-grafana}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET:?set in .env}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      # Browser goes to localhost:8180; Grafana's server-side calls use the
      # Docker-internal service name.
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://localhost:8180/realms/stigman/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8080/realms/stigman/protocol/openid-connect/token
      # api_url (userinfo) is intentionally NOT set: userinfo at keycloak:8080
      # would reject browser-issued tokens (issuer localhost:8180). All needed
      # claims (email, name, preferred_username, realm_access.roles) are in
      # the ID token via the realm's protocol mappers.
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: name
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(realm_access.roles[*], 'grafana_admin') && 'GrafanaAdmin' || 'Viewer'
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      # --- Infinity datasource provisioning secrets (interpolated in
      #     grafana/provisioning/datasources/infinity.yml) ---
      NEXUS_REPORTER_CLIENT_ID: ${NEXUS_REPORTER_CLIENT_ID:-nexus-reporter}
      NEXUS_REPORTER_CLIENT_SECRET: ${NEXUS_REPORTER_CLIENT_SECRET:?set in .env}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/dashboards-trends:/var/lib/grafana/dashboards-trends:ro
      - ./grafana/dashboards-snapshots:/var/lib/grafana/dashboards-snapshots:ro
      - ./grafana/dashboards-cyber:/var/lib/grafana/dashboards-cyber:ro
    networks: [stigman-lab]
    ports:
      - "3200:3000"   # documented deviation: host 3000 is occupied
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # --- metrics history (trends): exporter + Prometheus -------------------
  stigman-exporter:
    build: ./metrics-history/exporter
    image: stigman-exporter:1.1.0
    container_name: sml-stigman-exporter
    restart: unless-stopped
    depends_on:
      stigman:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      STIGMAN_API_URL: http://stigman:54000/api
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/stigman/protocol/openid-connect/token
      OIDC_CLIENT_ID: ${NEXUS_REPORTER_CLIENT_ID:-nexus-reporter}
      OIDC_CLIENT_SECRET: ${NEXUS_REPORTER_CLIENT_SECRET:?set in .env}
    networks: [stigman-lab]
    # Not published to the host: only Prometheus scrapes it. Use
    # metrics-history/local or /docker to run it standalone instead.

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: sml-prometheus
    restart: unless-stopped
    depends_on:
      - stigman-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
    volumes:
      - ./metrics-history/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [stigman-lab]
    ports:
      - "9091:9090"   # documented deviation: host 9090 is occupied
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
