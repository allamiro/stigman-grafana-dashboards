apiVersion: v1
kind: Service
metadata:
  name: stigman-exporter
  namespace: stigman-metrics
  labels:
    app.kubernetes.io/name: stigman-exporter
  annotations:
    # For annotation-based Prometheus discovery (if your Prometheus uses it):
    prometheus.io/scrape: "true"
    prometheus.io/port: "9633"
    prometheus.io/path: /metrics
spec:
  selector:
    app.kubernetes.io/name: stigman-exporter
  ports:
    - name: metrics
      port: 9633
      targetPort: metrics
