# Copy to secret.yaml, fill in real values, then:
#   kubectl apply -f secret.yaml
# Do NOT commit secret.yaml (only this .example is tracked).
# In production prefer ExternalSecrets/SealedSecrets over a plain Secret.
apiVersion: v1
kind: Secret
metadata:
  name: stigman-exporter
  namespace: stigman-metrics
type: Opaque
stringData:
  STIGMAN_API_URL: "http://stigman.example.internal:54000/api"
  KEYCLOAK_TOKEN_URL: "http://keycloak.example.internal:8080/realms/stigman/protocol/openid-connect/token"
  OIDC_CLIENT_ID: "nexus-reporter"
  OIDC_CLIENT_SECRET: "replace-me"
