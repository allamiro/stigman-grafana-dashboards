apiVersion: apps/v1
kind: Deployment
metadata:
  name: stigman-exporter
  namespace: stigman-metrics
  labels:
    app.kubernetes.io/name: stigman-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stigman-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stigman-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          # Build and push first:
          #   docker build -t <registry>/stigman-exporter:1.0.0 metrics-history/exporter
          #   docker push <registry>/stigman-exporter:1.0.0
          image: stigman-exporter:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: stigman-exporter
          ports:
            - name: metrics
              containerPort: 9633
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
