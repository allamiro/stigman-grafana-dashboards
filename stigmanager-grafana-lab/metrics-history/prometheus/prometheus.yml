# Prometheus config for the lab (compose service `prometheus`).
# Posture changes slowly; 60s resolution is plenty for trend reporting.
global:
  scrape_interval: 60s
  scrape_timeout: 20s

scrape_configs:
  - job_name: stigman-exporter
    static_configs:
      - targets: ["stigman-exporter:9633"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
