apiVersion: 1

providers:
  - name: stig-posture
    orgId: 1
    folder: STIG Posture
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
  - name: stig-posture-trends
    orgId: 1
    folder: STIG Posture (Trends)
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards-trends
      foldersFromFilesStructure: false
  - name: stig-posture-snapshots
    orgId: 1
    folder: STIG Posture (History Snapshots)
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards-snapshots
      foldersFromFilesStructure: false
  - name: stig-posture-cyber
    orgId: 1
    folder: STIG Posture (Cyber Analysis)
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards-cyber
      foldersFromFilesStructure: false
