name: Publish exporter image

# Build the STIG Manager posture exporter and push it to the GitHub
# Container Registry (GHCR). Runs when you push a version tag like
# `exporter-v1.1.0`, or on demand from the Actions tab.
on:
  push:
    tags:
      - 'exporter-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.1.0)'
        required: true
        default: '1.1.0'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/stigman-exporter
  CONTEXT: stigmanager-grafana-lab/metrics-history/exporter

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#exporter-v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing $IMAGE:$v"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
